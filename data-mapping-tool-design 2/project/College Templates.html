<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>College Outcome Analyst — Templates</title>
  <link rel="icon" type="image/svg+xml" href="assets/college-favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="site.css" />
  <link rel="stylesheet" href="college.css" />
  <style>
    body { font-family: var(--font-body); color: var(--fg); background: var(--bg); }
    .frame { display: none; }
    .frame.show { display: block; }
  </style>
</head>
<body>
  <div id="tabs"></div>
  <div id="home" class="frame show"></div>
  <div id="state" class="frame"></div>
  <div id="institution" class="frame"></div>
  <div id="program" class="frame"></div>
  <div id="rollup" class="frame"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="college-shared.jsx"></script>
  <script type="text/babel" src="page-college-home.jsx"></script>
  <script type="text/babel" src="page-college-state.jsx"></script>
  <script type="text/babel" src="page-college-institution.jsx"></script>
  <script type="text/babel" src="page-college-program.jsx"></script>
  <script type="text/babel" src="page-college-rollup.jsx"></script>

  <script type="text/babel">
    const { useState } = React;
    function TplTabs({ active, setActive }) {
      const tabs = [
        { k: "home",        n: "01", t: "Homepage",         sub: "brand entry · Oregon spotlight" },
        { k: "state",       n: "02", t: "State Hub",        sub: "Oregon · 75 institutions" },
        { k: "institution", n: "03", t: "Institution",      sub: "Oregon State University" },
        { k: "program",     n: "04", t: "Program × Inst.",  sub: "CS @ OSU · SEO oxygen" },
        { k: "rollup",      n: "05", t: "Program rollup",   sub: "CS in Oregon" },
      ];
      return (
        <div className="tpl-tabs" data-screen-label="Template tabs">
          <span className="label">College Outcome templates</span>
          {tabs.map(tb => (
            <button key={tb.k} type="button" className={active === tb.k ? "active" : ""} onClick={() => setActive(tb.k)}>
              <span className="num">{tb.n}</span>
              <span>{tb.t}</span>
              <span style={{ color: "#8A8E93", fontFamily: "var(--font-mono)", fontSize: 11 }}>· {tb.sub}</span>
            </button>
          ))}
          <span className="spacer"></span>
          <span className="meta">COLLEGE OUTCOME ANALYST · v0.1</span>
        </div>
      );
    }
    function App() {
      const [active, setActive] = useState("home");
      React.useEffect(() => {
        document.querySelectorAll(".frame").forEach(f => f.classList.toggle("show", f.id === active));
        window.scrollTo({ top: 0 });
      }, [active]);
      return <TplTabs active={active} setActive={setActive} />;
    }
    ReactDOM.createRoot(document.getElementById("tabs")).render(<App />);
    const mount = (id, El) => {
      if (!El) return;
      try { ReactDOM.createRoot(document.getElementById(id)).render(React.createElement(El)); }
      catch (e) { console.error("Failed to mount " + id, e); }
    };
    const tryMount = () => {
      if (window.CollegeHomePage && window.CollegeStatePage && window.CollegeInstitutionPage && window.CollegeProgramPage && window.CollegeRollupPage) {
        mount("home", window.CollegeHomePage);
        mount("state", window.CollegeStatePage);
        mount("institution", window.CollegeInstitutionPage);
        mount("program", window.CollegeProgramPage);
        mount("rollup", window.CollegeRollupPage);
      } else {
        setTimeout(tryMount, 50);
      }
    };
    tryMount();
  </script>
</body>
</html>
